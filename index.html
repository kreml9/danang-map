<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Da Nang Map + Photos</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
  #map { height: 100vh; width: 100%; }

  .leaflet-popup-content-wrapper { border-radius: 12px !important; padding: 0 !important; overflow: hidden; }
  .leaflet-popup-content { margin: 0 !important; width: min(340px, calc(100vw - 60px)) !important; }

  .photo-gallery { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; background: #111; height: 220px; }
  .photo-gallery::-webkit-scrollbar { height: 6px; }
  .photo-gallery::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.5); border-radius: 3px; }
  .photo-gallery img { scroll-snap-align: start; height: 220px; min-width: 240px; max-width: 400px; object-fit: cover; flex-shrink: 0; cursor: pointer; transition: opacity 0.15s; background: #222; }
  .photo-gallery img:hover { opacity: 0.85; }
  .photo-loading { height: 220px; display: flex; align-items: center; justify-content: center; background: #1a1a2e; color: #888; font-size: 14px; width: 100%; }
  .photo-empty { height: 80px; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: #99a; font-size: 13px; width: 100%; flex-direction: column; gap: 6px; }
  .photo-empty a { color: #60a5fa; text-decoration: none; font-size: 13px; }
  .photo-empty a:hover { text-decoration: underline; }
  .photo-count { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.6); color: white; font-size: 11px; padding: 2px 8px; border-radius: 10px; pointer-events: none; z-index: 10; }

  .popup-body { padding: 12px 14px 14px; }
  .popup-name { font-weight: 700; font-size: 15px; line-height: 1.3; }
  .popup-kr { font-weight: 400; font-size: 13px; color: #666; }
  .popup-type { color: #888; font-size: 12px; margin-top: 2px; }
  .popup-info { font-size: 13px; margin-top: 6px; line-height: 1.4; }
  .popup-hours { color: #059669; font-size: 12px; margin-top: 4px; }
  .popup-warn { color: #dc2626; font-size: 12px; margin-top: 2px; }
  .popup-addr { color: #999; font-size: 11px; margin-top: 4px; }
  .popup-dur { color: #7c3aed; font-size: 12px; margin-top: 2px; }
  .popup-naver { display: inline-block; margin-top: 8px; padding: 5px 12px; background: #4285F4; color: white; text-decoration: none; border-radius: 6px; font-size: 12px; font-weight: 600; }
  .popup-naver:hover { background: #3367d6; }

  .popup-map { display: block; width: 100%; height: 200px; border: 0; }
  .popup-actions { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; padding-top: 10px; border-top: 1px solid #eee; }
  .popup-btn { display: inline-block; padding: 7px 12px; border-radius: 7px; font-size: 12px; font-weight: 600; text-decoration: none; transition: background 0.15s; }
  .popup-btn-primary { background: #4285F4; color: white; flex: 1 1 100%; text-align: center; padding: 9px 12px; font-size: 13px; }
  .popup-btn-primary:hover { background: #3367d6; }
  .popup-btn-secondary { background: #f0f4f8; color: #1f2937; flex: 1 1 auto; text-align: center; }
  .popup-btn-secondary:hover { background: #e2e8f0; }
  .popup-io { display: inline-block; margin-top: 4px; font-size: 11px; background: #f0f0f0; padding: 2px 8px; border-radius: 4px; }
  .io-filter { margin-top: 8px; padding-top: 8px; border-top: 1px solid #eee; }
  .io-btn { cursor: pointer; padding: 3px 8px; border-radius: 4px; font-size: 12px; border: 1px solid #ddd; background: white; margin: 2px; }
  .io-btn.active { background: #3b82f6; color: white; border-color: #3b82f6; }

  .legend { background: white; padding: 10px 14px; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,0.15); font-size: 13px; max-height: 65vh; overflow-y: auto; }
  .legend-title { font-weight: 700; font-size: 15px; margin-bottom: 6px; display: flex; align-items: center; justify-content: space-between; }
  .legend-toggle { display: none; background: none; border: none; font-size: 18px; cursor: pointer; padding: 0 4px; }
  .legend-body { }
  .legend-body.collapsed { display: none; }
  .filter-btn { cursor: pointer; padding: 3px 0; display: flex; align-items: center; gap: 6px; transition: opacity 0.15s; }
  .filter-btn:hover { opacity: 0.7; }
  .filter-btn.off { opacity: 0.35; text-decoration: line-through; }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  @media (max-width: 600px) {
    .legend { max-height: 50vh; padding: 8px 10px; font-size: 12px; max-width: 180px; }
    .legend-toggle { display: inline-block; }
    .filter-btn { padding: 6px 0; min-height: 32px; }
    .io-btn { padding: 6px 10px; font-size: 13px; min-height: 36px; }
    .dot { width: 12px; height: 12px; }
    .popup-body { padding: 10px 12px 12px; }
    .popup-name { font-size: 14px; }
    .popup-info { font-size: 12px; }
    .fs-nav { width: 44px; height: 60px; font-size: 28px; }
    .fs-prev { left: 6px; }
    .fs-next { right: 6px; }
    .fs-close { top: 10px; right: 12px; font-size: 28px; }
    .photo-gallery { height: 180px; }
    .photo-gallery img { height: 180px; min-width: 200px; }
  }

  .fullscreen-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 10000; align-items: center; justify-content: center; flex-direction: column; }
  .fullscreen-overlay.active { display: flex; }
  .fullscreen-overlay img { max-width: 92vw; max-height: 85vh; object-fit: contain; border-radius: 4px; user-select: none; }
  .fs-counter { color: rgba(255,255,255,0.7); font-size: 14px; margin-top: 12px; }
  .fs-nav { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.15); border: none; color: white; font-size: 36px; width: 50px; height: 70px; cursor: pointer; border-radius: 8px; transition: background 0.15s; z-index: 10001; }
  .fs-nav:hover { background: rgba(255,255,255,0.3); }
  .fs-prev { left: 16px; }
  .fs-next { right: 16px; }
  .fs-close { position: absolute; top: 16px; right: 20px; background: none; border: none; color: rgba(255,255,255,0.7); font-size: 32px; cursor: pointer; z-index: 10001; }
  .fs-close:hover { color: white; }
</style>
</head>
<body>
<div id="map"></div>
<div class="fullscreen-overlay" id="fs" onclick="if(event.target===this)closeFs()">
  <button class="fs-close" onclick="closeFs()">✕</button>
  <button class="fs-nav fs-prev" onclick="event.stopPropagation();fsNav(-1)">‹</button>
  <img id="fs-img">
  <button class="fs-nav fs-next" onclick="event.stopPropagation();fsNav(1)">›</button>
  <div class="fs-counter" id="fs-counter"></div>
</div>

<script>
const map = L.map('map').setView([16.06, 108.15], 11);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap', maxZoom: 19 }).addTo(map);

const C = {
  temple:'#8b5cf6', park:'#22c55e', view:'#f59e0b', photo:'#ec4899',
  market:'#f97316', district:'#6366f1', museum:'#0ea5e9', event:'#ef4444',
  hidden:'#14b8a6', trek:'#84cc16', shop:'#d946ef',
  beach:'#0891b2', bridge:'#e11d48', cafe:'#a16207',
  gf_ded: '#16a34a',
  gf_opt: '#3b82f6',
};
const CAT = {
  temple:{n:'🛕 Храмы/пагоды',e:'🛕'}, park:{n:'🌳 Парки',e:'🌳'}, view:{n:'🌅 Смотровые',e:'🌅'},
  photo:{n:'📸 Фото-споты',e:'📸'}, market:{n:'🛒 Рынки',e:'🛒'}, district:{n:'🏘️ Районы',e:'🏘️'},
  museum:{n:'🖼️ Музеи',e:'🖼️'}, event:{n:'🎪 События',e:'🎪'}, hidden:{n:'💎 Hidden gems',e:'💎'},
  trek:{n:'🥾 Треккинг',e:'🥾'}, shop:{n:'🛍️ Шоппинг',e:'🛍️'},
  beach:{n:'🏖️ Пляжи',e:'🏖️'}, bridge:{n:'🌉 Мосты',e:'🌉'}, cafe:{n:'☕ Кафе/rooftop',e:'☕'},
  gf_ded: {n: '🥬 GF 100% dedicated', e: '🥬'},
  gf_opt: {n: '🍽️ GF опции в меню', e: '🍽️'}
};

const layers = {};
Object.keys(CAT).forEach(k => { layers[k] = L.layerGroup().addTo(map); });

function mkIcon(color, emoji) {
  const size = 30;
  const fs = 15;
  const border = '2.5px solid white';
  const shadow = '0 2px 6px rgba(0,0,0,0.3)';
  return L.divIcon({
    className: '',
    html: `<div style="width:${size}px;height:${size}px;background:${color};border:${border};border-radius:50%;box-shadow:${shadow};display:flex;align-items:center;justify-content:center;font-size:${fs}px;line-height:1;">${emoji}</div>`,
    iconSize: [size,size], iconAnchor: [size/2,size/2], popupAnchor: [0,-size/2-2]
  });
}

const photoCache = {};

async function fetchPhotos(lat, lng, name, searchQuery, krName) {
  const key = searchQuery || name;
  if (photoCache[key]) return photoCache[key];

  const urls = [];
  const seen = new Set();

  const junk = /\b(map|logo|icon|diagram|plan|stamp|flag|seal|coat.of.arms|signing|certificate|svg|ticket|layout|floor.plan|route|schema|emblem|badge)\b/i;

  function parse(data) {
    if (!data.query || !data.query.pages) return;
    Object.values(data.query.pages).forEach(p => {
      if (p.imageinfo) {
        const ii = p.imageinfo[0];
        const title = p.title || '';
        const isJunk = junk.test(title) || ii.mime === 'image/svg+xml' || (ii.thumburl && ii.thumburl.includes('.svg'));
        if (ii.mime && ii.mime.startsWith('image/') && ii.thumburl && !seen.has(ii.thumburl) && !isJunk) {
          seen.add(ii.thumburl);
          urls.push({ thumb: ii.thumburl, full: ii.url });
        }
      }
    });
  }

  async function search(query, limit) {
    try {
      const q = encodeURIComponent(query);
      const r = await fetch(`https://commons.wikimedia.org/w/api.php?action=query&generator=search&gsrsearch=${q}&gsrlimit=${limit}&gsrnamespace=6&prop=imageinfo&iiprop=url|mime&iiurlwidth=200&format=json&origin=*`);
      return await r.json();
    } catch(e) { return {}; }
  }

  const promises = [search(searchQuery || name, 12)];
  if (krName) promises.push(search(krName, 8));
  promises.push(fetch(`https://commons.wikimedia.org/w/api.php?action=query&generator=geosearch&ggscoord=${lat}|${lng}&ggsradius=500&ggslimit=6&prop=imageinfo&iiprop=url|mime&iiurlwidth=200&format=json&origin=*`).then(r=>r.json()).catch(()=>({})));

  const results = await Promise.all(promises);
  results.forEach(d => parse(d));

  photoCache[key] = urls.slice(0, 12);
  return photoCache[key];
}

let fsPhotos = [];
let fsIndex = 0;

function openFull(url) {
  const gallery = document.querySelector('.photo-gallery');
  if (gallery) {
    fsPhotos = Array.from(gallery.querySelectorAll('img')).map(img => {
      const onclick = img.getAttribute('onclick') || '';
      const match = onclick.match(/openFull\('([^']+)'\)/);
      return match ? match[1] : img.src;
    });
    fsIndex = fsPhotos.indexOf(url);
    if (fsIndex === -1) fsIndex = 0;
  } else {
    fsPhotos = [url];
    fsIndex = 0;
  }
  showFsPhoto();
  document.getElementById('fs').classList.add('active');
}

function showFsPhoto() {
  document.getElementById('fs-img').src = fsPhotos[fsIndex];
  document.getElementById('fs-counter').textContent = `${fsIndex + 1} / ${fsPhotos.length}  ←→`;
}

function fsNav(dir) {
  fsIndex = (fsIndex + dir + fsPhotos.length) % fsPhotos.length;
  showFsPhoto();
}

function closeFs() {
  document.getElementById('fs').classList.remove('active');
}

document.addEventListener('keydown', (e) => {
  const fs = document.getElementById('fs');
  if (!fs.classList.contains('active')) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); fsNav(1); }
  else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); fsNav(-1); }
  else if (e.key === 'Escape') { closeFs(); }
});

function add(cat, lat, lng, name, kr, type, info, hours, warn, addr, search, io, dur, insta) {
  const ic = mkIcon(C[cat], CAT[cat].e);
  const marker = L.marker([lat, lng], {icon: ic}).addTo(layers[cat]);
  marker.options.io = io || 'both';

  marker.on('click', function() {
    const gQuery = encodeURIComponent((kr ? kr + ' ' : '') + name + ' Da Nang');
    const gPlaceUrl = `https://www.google.com/maps/search/?api=1&query=${gQuery}`;
    const gPhotosUrl = `https://www.google.com/search?q=${gQuery}&tbm=isch`;
    const embedUrl = `https://maps.google.com/maps?q=${encodeURIComponent((kr || name) + ' Da Nang')}&z=18&output=embed`;

    let html = '';
    html += `<iframe class="popup-map" loading="lazy" src="${embedUrl}" width="100%" height="200" style="border:0;display:block" referrerpolicy="no-referrer-when-downgrade"></iframe>`;
    html += `<div class="popup-body">`;
    html += `<div class="popup-name">${CAT[cat].e} ${name} <span class="popup-kr">${kr||''}</span></div>`;
    html += `<div class="popup-type">${type}</div>`;
    if (info) html += `<div class="popup-info">${info}</div>`;
    if (hours) html += `<div class="popup-hours">🕐 ${hours}</div>`;
    if (dur) html += `<div class="popup-dur">⏱️ ${dur}</div>`;
    if (warn) html += `<div class="popup-warn">⚠️ ${warn}</div>`;
    if (addr) html += `<div class="popup-addr" style="cursor:pointer" onclick="navigator.clipboard.writeText('${addr.replace(/'/g, "\\'")}');this.innerHTML='✅ Скопировано!';setTimeout(()=>this.innerHTML='📍 ${addr.replace(/'/g, "\\'")}',1500)">📍 ${addr}</div>`;
    if (io) { const badge = io==='in'?'🏠 Indoor':io==='out'?'☀️ Outdoor':'🏠☀️ Indoor+Outdoor'; html += `<div class="popup-io">${badge}</div>`; }
    html += `<div class="popup-actions">`;
    html += `<a class="popup-btn popup-btn-primary" href="${gPlaceUrl}" target="_blank" rel="noopener">📷 Фото и отзывы в Google Maps</a>`;
    if (insta) html += `<a class="popup-btn popup-btn-secondary" href="https://instagram.com/${insta}" target="_blank" rel="noopener">📸 @${insta}</a>`;
    html += `<a class="popup-btn popup-btn-secondary" href="${gPhotosUrl}" target="_blank" rel="noopener">🔍 Все фото Google</a>`;
    html += `</div>`;
    html += `</div>`;

    marker.unbindPopup();
    marker.bindPopup(html, {maxWidth: 360, minWidth: 360}).openPopup();
  });
}

const legend = L.control({position: 'topright'});
legend.onAdd = () => {
  const div = L.DomUtil.create('div', 'legend');
  const isMobile = window.innerWidth <= 600;
  const collapsed = isMobile ? ' collapsed' : '';
  const arrow = isMobile ? '▶' : '▼';
  let html = `<div class="legend-title">🇻🇳 Da Nang <button class="legend-toggle" onclick="toggleLegend()">${arrow}</button></div><div class="legend-body${collapsed}" id="legend-body"><div style="font-size:11px;color:#888;margin-bottom:8px">Клик → фото + детали<br>Свайп → ещё фото<br>Клик фото → на весь экран</div>`;
  Object.entries(CAT).forEach(([k, v]) => {
    html += `<div class="filter-btn" id="fb-${k}" onclick="toggle('${k}')"><span class="dot" style="background:${C[k]}"></span>${v.n}</div>`;
  });
  html += `<div style="margin-top:8px;font-size:11px;color:#aaa">${Object.values(layers).reduce((s,l)=>s+l.getLayers().length,0)} мест</div>`;
  html += `<div class="io-filter">
  <div style="font-size:12px;font-weight:600;margin-bottom:4px">Тип:</div>
  <button class="io-btn active" id="io-all" onclick="filterIO('all')">Все</button>
  <button class="io-btn" id="io-out" onclick="filterIO('out')">☀️ Outdoor</button>
  <button class="io-btn" id="io-in" onclick="filterIO('in')">🏠 Indoor</button>
</div></div>`;
  div.innerHTML = html;
  return div;
};
legend.addTo(map);

window.toggle = function(k) {
  const btn = document.getElementById(`fb-${k}`);
  if (map.hasLayer(layers[k])) { map.removeLayer(layers[k]); btn.classList.add('off'); }
  else { map.addLayer(layers[k]); btn.classList.remove('off'); }
};

window.toggleLegend = function() {
  const body = document.getElementById('legend-body');
  const btn = document.querySelector('.legend-toggle');
  body.classList.toggle('collapsed');
  btn.textContent = body.classList.contains('collapsed') ? '▶' : '▼';
};

(function() {
  const fsEl = document.getElementById('fs');
  let touchStartX = 0;
  let touchStartY = 0;
  fsEl.addEventListener('touchstart', function(e) {
    touchStartX = e.changedTouches[0].screenX;
    touchStartY = e.changedTouches[0].screenY;
  }, {passive: true});
  fsEl.addEventListener('touchend', function(e) {
    const dx = e.changedTouches[0].screenX - touchStartX;
    const dy = e.changedTouches[0].screenY - touchStartY;
    if (Math.abs(dx) < 40 || Math.abs(dy) > Math.abs(dx)) return;
    if (dx < 0) fsNav(1);
    else fsNav(-1);
  }, {passive: true});
})();

window.filterIO = function(mode) {
  document.querySelectorAll('.io-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('io-' + mode).classList.add('active');
  Object.values(layers).forEach(lg => {
    lg.eachLayer(m => {
      const mio = m.options.io || 'both';
      if (mode === 'all' || mio === mode || mio === 'both') {
        m.setOpacity(1);
        if (m._icon) m._icon.style.display = '';
      } else {
        m.setOpacity(0);
        if (m._icon) m._icon.style.display = 'none';
      }
    });
  });
};

// === МЕСТА ===

// ━━━━━━━━ CANONICAL MUST-SEE ━━━━━━━━
add('bridge', 16.0612, 108.2297, 'Dragon Bridge', 'Cầu Rồng', 'Символ Дананга', 'Стальной мост-дракон 666 м через реку Хан. Шоу огня и воды — пт/сб/вс в 21:00 (~15 мин). Лучший вид — с восточного берега или Love Bridge. Бесплатно.', '24/7 • шоу пт-вс 21:00', null, 'Đường Nguyễn Văn Linh, Hải Châu', 'Dragon Bridge Da Nang', 'out', '45-60 мин', 'danang.official');
add('photo', 15.9989, 107.9953, 'Golden Bridge', 'Cầu Vàng', 'Ba Na Hills 1400м', 'Пешеходный мост 150 м на высоте 1414 м, поддерживаемый гигантскими каменными руками. Главная фототочка Вьетнама. Входит в билет Sun World Ba Na Hills (~900k VND).', '08:00-22:00', null, 'Sun World Bà Nà Hills, Hòa Ninh, Hòa Vang', 'Golden Bridge Ba Na Hills', 'out', '3-4 ч (весь парк)', 'goldenbridge_vietnam');
add('trek', 15.9755, 108.2609, 'Marble Mountains', 'Ngũ Hành Sơn', '5 мраморных гор', 'Пять мраморных гор с пещерными буддийскими храмами и алтарями. Главная — Thuy Son (156 ступеней или лифт). Пещеры Huyen Khong и Am Phu. Вид на море.', '07:00-17:30', null, '81 Huyền Trân Công Chúa, Hoà Hải, Ngũ Hành Sơn', 'Marble Mountains Da Nang', 'both', '2-3 ч', null);
add('temple', 16.1003, 108.2777, 'Lady Buddha / Linh Ung Son Tra', 'Chùa Linh Ứng Bãi Bụt', 'Самая большая пагода', 'Самый знаменитый храм города: статуя Богини Милосердия 67 м (самая высокая во Вьетнаме), на полуострове Son Tra. Внутри статуи — 17 уровней с буддистскими алтарями. Вид на весь город. Бесплатно.', '06:00-21:00', null, 'Bãi Bụt, Thọ Quang, Sơn Trà', 'Linh Ung Pagoda Son Tra Lady Buddha', 'out', '1-1.5 ч', null);
add('museum', 16.0599, 108.2226, 'Museum of Cham Sculpture', 'Bảo tàng Điêu khắc Chăm', 'Цивилизация Чам', 'Единственный в мире музей Чамской цивилизации. 300+ скульптур V-XV вв. из песчаника, терракоты и бронзы. 12 географических галерей. Основан французами в 1919. Must-see.', '07:30-11:00, 13:00-17:00 (пн вых.)', null, '02 Đường 2 Tháng 9, Bình Hiên, Hải Châu', 'Museum Cham Sculpture Danang', 'in', '1.5-2 ч', null);
add('view', 16.1874, 108.1307, 'Hai Van Quan + Pass Summit', 'Hải Vân Quan / Đèo Hải Vân', 'Врата под небесами', 'Форт XIX в. императора Минь Манга на вершине перевала 496 м (Top Gear: «лучшая дорога мира»). Реставрирован с авг.2024, с 2026 — платно 70k VND. Вид с одной точки: Дананг-бэй юг, Ланг Ко лагуна север. Кофе-точки у дороги.', '07:00-17:00', '70k VND (с 2026)', 'Hải Vân Pass, Hoà Vang / Phú Lộc border', 'Hai Van Quan fort summit', 'out', '1.5-2 ч', null);
add('temple', 16.0667, 108.2230, 'Da Nang Cathedral (Pink Church)', 'Nhà thờ Con Gà', 'Розовая церковь', 'Единственный колониальный католический собор Дананга (1924). Готика, розовый фасад, медный петух-флюгер (отсюда «Куриная церковь»). Снаружи фотогеничнее. Мессы по расписанию.', '06:00-11:30, 14:00-17:00', null, '156 Trần Phú, Hải Châu', 'Da Nang Cathedral Pink Church', 'both', '30-45 мин', null);
add('park', 16.0589, 108.2232, 'APEC Sculpture Park + Dragon Carp', 'Công viên APEC', 'Набережный парк', 'Парк-галерея скульптур стран АТЭС на набережной Хан. Рядом — статуя карпа-дракона 7.5м / 200т. Вечерняя подсветка. Бесплатно.', '24/7', null, 'Đường Bạch Đằng & 2 Tháng 9, Hải Châu', 'APEC Park Da Nang', 'out', '30-45 мин', null);

add('bridge', 16.07228, 108.22672, 'Han River Swing Bridge', 'Cầu Sông Hàn', 'Разводной мост', 'Первый в Вьетнаме разводной мост (2000). Разводится: сб-вс в 23:00, будни в 01:00 — пропускает суда. Красивая ночная подсветка. Бесплатно.', '24/7 • развод сб-вс 23:00', null, 'Đường Trần Phú, Thạch Thang, Hải Châu', 'Han River Swing Bridge', 'out', '20-30 мин', null);
add('bridge', 16.09509, 108.22031, 'Thuan Phuoc Bridge', 'Cầu Thuận Phước', 'Самый длинный вантовый', 'Самый длинный вантовый мост Вьетнама (1850 м). Замыкает реку на выходе к морю. Пешеходные дорожки, вид на бухту. Ночная подсветка.', '24/7', null, 'Phường Thuận Phước, Hải Châu', 'Thuan Phuoc Bridge Da Nang', 'out', '20-30 мин', null);
add('bridge', 16.05028, 108.22972, 'Tran Thi Ly Bridge', 'Cầu Trần Thị Lý', 'Парусный мост', 'Парусный мост 2013 г. — три белых паруса 145 м над рекой. Лучший ракурс — с набережной Bach Dang или с лодки. Ночная подсветка.', '24/7', null, 'Đường Trần Thị Lý, Hải Châu', 'Tran Thi Ly Bridge', 'out', '15-20 мин', null);
add('bridge', 16.05105, 108.22839, 'Nguyen Van Troi Walking Bridge', 'Cầu Nguyễn Văn Trỗi', 'Исторический жёлтый', 'Американский мост 1965 г. (514 м, жёлтый), с 2015 — пешеходный. Редкая ферменная конструкция Pony. Ночная иллюминация с 2024.', '24/7', null, 'Đường 2 Tháng 9, Hải Châu', 'Nguyen Van Troi Bridge Da Nang', 'out', '20-30 мин', null);
add('bridge', 16.07350, 108.22800, 'Love Bridge + Dragon Carp Statue', 'Cầu Tình Yêu', 'Замки влюблённых', 'Пешеходный мост 68 м с красными фонарями-сердцами и замочками. Рядом — мраморная статуя карпа-дракона 7.5 м. Лучшая точка съёмки шоу Dragon Bridge — прямо на голову.', '24/7', null, 'Trần Hưng Đạo, An Hải Trung, Sơn Trà', 'Love Bridge Da Nang', 'out', '30-45 мин', null);

add('beach', 16.0603, 108.2468, 'My Khe Beach', 'Bãi biển Mỹ Khê', 'Главный пляж', 'Главный туристический пляж — 9-32 км белого песка. Forbes: «один из красивейших пляжей планеты». Сёрфинг, шезлонги, бары. Для ребёнка — северный участок у Pham Van Dong спокойнее.', '24/7, лайфгарды 6:00-18:00', null, 'Võ Nguyên Giáp, Mỹ An, Ngũ Hành Sơn', 'My Khe Beach Da Nang', 'out', '2-4 ч', null);
add('beach', 16.0733, 108.2468, 'Pham Van Dong Beach', 'Bãi biển Phạm Văn Đồng', 'Городской пляж', 'Инфраструктура: душевые, раздевалки, спасатели. Спокойная вода, пологий вход — для ребёнка 8 мес. идеально. Парк с фонтанами рядом.', '24/7', null, 'Đường Phạm Văn Đồng, Phước Mỹ, Sơn Trà', 'Pham Van Dong Beach', 'out', '1-3 ч', null);
add('beach', 16.0386, 108.2533, 'Bac My An Beach', 'Bãi biển Bắc Mỹ An', 'Тихий пляж у резортов', '4 км белого песка между My Khe и курортами Ngu Hanh Son. Чистая вода, спокойный прибой. Много отелей с пляжным сервисом.', '24/7', null, 'Bắc Mỹ An, Ngũ Hành Sơn', 'Bac My An Beach', 'out', '2-3 ч', null);
add('beach', 15.9955, 108.2739, 'Non Nuoc Beach', 'Bãi biển Non Nước', 'У Мраморных гор', 'Тихий пляж у Marble Mountains, менее туристический. Крупный белый песок, синяя вода. Рядом деревня резчиков по мрамору. Хорошо с ребёнком — мало волн.', '24/7', null, 'Hòa Hải, Ngũ Hành Sơn', 'Non Nuoc Beach Da Nang', 'out', '1-3 ч', null);
add('beach', 16.0890, 108.2496, 'Man Thai Fishing Beach', 'Bãi biển Mân Thái', 'Рыбацкий пляж', 'Рыбацкий пляж у подножья Monkey Mountain. Круглые плетёные лодки thuyền thúng, рыбаки с сетями. Локальная атмосфера, туристов почти нет.', '24/7', null, 'Mân Thái, Sơn Trà', 'Man Thai Beach', 'out', '1-2 ч', null);
add('beach', 16.1236, 108.2201, 'Tien Sa Beach', 'Bãi biển Tiên Sa', 'Укромный пляж', 'Тихий пляж у грузового порта. Защищён горой — спокойная вода без волн. Вход через эко-зону, платно. Лесные горы с трёх сторон.', '06:00-18:00', null, 'Cuối đường Yết Kiêu, Thọ Quang, Sơn Trà', 'Tien Sa Beach Da Nang', 'out', '1-3 ч', null);
add('beach', 16.1046, 108.2991, 'Bai Nam Beach', 'Bãi Nam', 'Скрытый пляж Son Tra', 'Нетронутый пляж ~600 м между статуей Lady Buddha и InterContinental. Кокосовые пальмы, спокойная вода, горы за спиной. Доступ на байке.', '24/7', null, 'Bãi Nam, bán đảo Sơn Trà', 'Bai Nam Beach Son Tra', 'out', '2-4 ч', null);
add('beach', 16.1056, 108.3004, 'Bai But Beach', 'Bãi Bụt', 'Дикий рай', '«Дикий рай» Дананга — 300 м дикого пляжа, вода настолько прозрачная что видны кораллы с берега. Частично закрыт стройкой — заходить с открытой стороны.', '06:00-18:00', null, 'Bán đảo Sơn Trà', 'Bai But Beach Son Tra', 'out', '2 ч', null);
add('beach', 16.1205, 108.1285, 'Nam O Beach + Reef', 'Bãi Rạn Nam Ô', 'Коралловый риф', 'Дикий рифовый пляж в 17 км от центра. Рыбацкая деревня с традиционным производством рыбного соуса nuoc mam. Скалы + песок, риф с зелёным мхом.', '24/7', null, 'Hòa Hiệp Bắc, Liên Chiểu', 'Nam O Beach reef', 'out', '2-4 ч', null);
add('beach', 16.0959, 108.1463, 'Xuan Thieu / Red Beach', 'Bãi biển Xuân Thiều', 'Красный пляж', 'Локальный пляж 3 км в сосновых лесах. Редко туристы. «Красный пляж» — закат окрашивает воду в красный. Морепродукт в кафе. 13 км от центра.', '24/7', null, 'Hòa Hiệp Nam, Liên Chiểu', 'Xuan Thieu Red Beach', 'out', '1-2 ч', null);
add('beach', 16.0755, 108.2496, 'Phuoc My Beach', 'Bãi biển Phước Mỹ', 'Тихая альтернатива', '600 м между My Khe и подножием Son Tra. Кокосовые пальмы, недорогие морепродукты, в будни почти пусто. Местные называют «настоящим My Khe».', '24/7', null, 'Võ Nguyên Giáp, An Hải, Sơn Trà', 'Phuoc My Beach Da Nang', 'out', '2 ч', null);
add('photo', 16.1363, 108.2346, 'Black Stone Beach', 'Bãi Đá Đen', 'Чёрные скалы', 'Скрытый пляж из чёрной вулканической базальтовой гальки на СЗ Son Tra. Трек 4.5 км через лес. Осторожно: часть маршрутов через военные зоны — не следовать вслепую GPS.', '24/7', '⚠️ Маршрут через военные зоны — уточнять', 'Thọ Quang, Sơn Trà', 'Bai Da Den Black Stone Beach', 'out', '3-5 ч', null);

add('temple', 15.9756, 108.2609, 'Linh Ung Marble Mountains', 'Chùa Linh Ứng Non Nước', 'Старейшая Линь Ынг', 'Старейший из трёх Линь Ынгов — 300+ лет. На горе Thuy Son внутри Marble Mountains. Стела Xaloi 30 м с 200 изображениями Будды. Вход в составе билета на Marble Mountains.', '07:00-17:30', null, 'Thủy Sơn, Ngũ Hành Sơn', 'Linh Ung Pagoda Marble Mountains', 'out', '30-45 мин', null);
add('temple', 15.9768, 108.2620, 'Tam Thai Pagoda', 'Chùa Tam Thai', 'Императорский храм', 'Один из старейших храмов — с XVII века, перестроен императором Минь Мангом в 1825. 156 ступеней через ворота дракона. Национальный памятник. В составе Marble Mountains.', '07:00-17:30', null, 'Thủy Sơn, Ngũ Hành Sơn', 'Tam Thai Pagoda Marble Mountains', 'out', '20-30 мин', null);
add('trek', 15.9752, 108.2615, 'Huyen Khong Cave', 'Động Huyền Không', 'Главная пещера', 'Самая большая пещера Marble Mountains с буддийским алтарём. Через провал в потолке — «прожектор» солнца на статую Thien Y A Na. Одно из культовых фото Дананга.', '07:00-17:30', null, 'Thủy Sơn, Ngũ Hành Sơn', 'Huyen Khong Cave', 'in', '20-30 мин', null);
add('trek', 15.9756, 108.2620, 'Am Phu Cave (Hell Cave)', 'Động Âm Phủ', '18 кругов ада', 'Пещера «18 кругов ада» в Thuy Son — скульптуры демонов и грешников в темных гротах. Жутко, фотогенично.', '07:00-17:30', null, 'Thủy Sơn, Ngũ Hành Sơn', 'Am Phu Cave Hell', 'in', '45 мин', null);
add('temple', 15.9988, 108.2551, 'Quan The Am Pagoda', 'Chùa Quán Thế Âm', 'Пагода Гуань Инь', 'Основана в 1957 у горы Kim Son (одна из 5 мраморных). Спокойное место вдали от туристов. Ежегодный фестиваль Quan The Am. Бесплатно.', '06:00-18:00', null, '48 Sư Vạn Hạnh, Hoà Hải, Ngũ Hành Sơn', 'Quan The Am Pagoda', 'out', '30-45 мин', null);
add('temple', 16.0623, 108.2155, 'Phap Lam Pagoda', 'Chùa Pháp Lâm', 'Главный городской', 'Главный буддийский центр Дананга (1934). Двухэтажный на 1000 мест, резные колонны, золотая статуя Будды. Штаб буддийской ассоциации провинции. Бесплатно.', '05:00-11:30, 13:00-21:30', null, '574 Ông Ích Khiêm, Nam Dương, Hải Châu', 'Phap Lam Pagoda Da Nang', 'out', '30-45 мин', null);
add('temple', 16.0560, 108.2187, 'Pho Da Pagoda', 'Chùa Phổ Đà', '100+ лет', 'Основана 1915, один из старейших храмов города. Статуя Амитабха 2.4 м. Исторически значимый центр буддизма Центрального Вьетнама.', '06:00-19:00', null, '340 Phan Châu Trinh, Bình Thuận, Hải Châu', 'Pho Da Pagoda', 'out', '20-30 мин', null);
add('temple', 15.9987, 108.2052, 'Nam Son Pagoda', 'Chùa Nam Sơn', 'Хюэ в миниатюре', '«Хюэ в миниатюре» — рекреация дворцовой архитектуры Хюэ среди поля лотосов, 10 км от центра. Никаких туристов, только местные паломники.', '06:00-18:00', null, 'Thôn Cẩm Na, Hòa Châu, Hòa Vang', 'Nam Son Pagoda Da Nang', 'out', '1-1.5 ч', null);
add('temple', 15.9971, 107.9940, 'Linh Ung Ba Na', 'Chùa Linh Ứng Bà Nà', 'Высокогорная пагода', 'Самая высокогорная из трёх Линь Ынгов — на 1487 м на вершине Ba Na. Территория курорта Sun World Ba Na Hills. Архитектура сливается с облаками.', '08:00-17:00', null, 'Sun World Ba Na Hills', 'Linh Ung Pagoda Ba Na', 'out', '30-45 мин', null);
add('temple', 16.0722, 108.2167, 'Cao Dai Temple', 'Thánh thất Cao Đài', 'Храм каодай', 'Второй по величине храм Cao Dai во Вьетнаме. Нео-готика + барокко + восток: колонны с драконами, «Всевидящее око». Молебны 4 раза в день; самый зрелищный в полдень (цветные ризы).', '05:30-21:00', null, '63D Hải Phòng, Thạch Thang, Hải Châu', 'Cao Dai Temple Da Nang', 'both', '45-60 мин', null);

// ━━━━━━━━ ГОРЫ / ПРИРОДА / ВИДЫ ━━━━━━━━
add('photo', 15.9956, 107.9942, 'Ba Na Hills French Village', 'Làng Pháp Bà Nà', 'Европа на 1500м', 'Реплика европейского городка на 1487 м: брусчатка, готическая церковь Сен-Дени, замки, площади. Канатная дорога 5801 м — рекорд длины. Билет ~750k VND.', '07:30-22:00', null, 'Sun World Ba Na Hills', 'Ba Na Hills French Village', 'out', '4-6 ч', 'sunworldbanahills');
add('view', 16.1200, 108.2759, 'Ban Co Peak', 'Đỉnh Bàn Cờ', 'Шахматная вершина', 'Высшая точка Son Tra (581 м) — бронзовый мудрец за шахматной доской. Панорама 360°: весь Дананг, залив, Хай Ван. Дикие обезьяны-доуки. Только на мотобайке.', '24/7', null, 'Đỉnh Bàn Cờ, Thọ Quang, Sơn Trà', 'Ban Co Peak Son Tra', 'out', '2-3 ч', null);
add('trek', 16.1141, 108.3100, 'Son Tra 1000-Year Banyan', 'Cây Đa Sơn Trà', '1000-летнее дерево', 'Баньяновое дерево ~800-1000 лет: обхват ствола 10 м, 26 воздушных корней. Охраняемое наследие. Трек ~1-2 км от дороги.', '24/7', null, 'Sub-zone 63, Son Tra Nature Reserve', 'Son Tra Banyan Tree', 'out', '2 ч', null);
add('view', 16.1375, 108.3267, 'Tien Sa Lighthouse', 'Hải Đăng Tiên Sa', 'Маяк 1902 года', 'Маяк 1902 г. (фр. колония) на вершине Son Tra, 238 м. Вид на весь залив. «Новая звезда чекина», туристов ещё мало. 20 000 VND.', '05:00-21:00 (башня до 18:00)', null, 'Bán đảo Sơn Trà', 'Tien Sa Lighthouse', 'out', '1.5 ч', null);
add('view', 16.1334, 108.3100, 'Mui Nghe Sunrise Point', 'Mũi Nghê', 'Первый рассвет', 'Самый восточный мыс Дананга (≈17 км от центра, 35 мин на машине + трек 30-45 мин). Первое место где встаёт солнце в городе. Скалы, море, никаких зданий. Старт трека 04:00-04:30. Только мотобайк.', '24/7', '⚠️ Точка входа на трек ≈ 16.13, 108.31', 'Son Tra Peninsula, eastern tip, Tho Quang', 'Mui Nghe Cape Son Tra sunrise', 'out', '2-3 ч', null);
add('shop', 16.0007, 108.2623, 'Non Nuoc Stone Carving Village', 'Làng đá mỹ nghệ Non Nước', 'Деревня резчиков', 'Национальное нематериальное наследие (2014). 300+ семейных мастерских вдоль 800 м. Скульптуры из мрамора ручной работы от Будд до декора. Торг уместен.', '07:00-18:00', null, 'Huyền Trân Công Chúa, Hoà Hải, Ngũ Hành Sơn', 'Non Nuoc Stone Village', 'out', '1-1.5 ч', null);
add('hidden', 16.0799, 108.0554, 'Hoa Trung Lake', 'Hồ Hòa Trung', 'Горное озеро', 'Крупнейшее искусственное озеро Дананга (6.5 км²) среди холмов. Местные приезжают на рыбалку и кемпинг. Сентябрь-октябрь — сухая степь в воде. Иностранцев почти нет.', '07:00-17:00', null, 'Hòa Ninh & Hòa Liên, Hoà Vang', 'Hoa Trung Lake Da Nang', 'out', '2-4 ч', null);

add('market', 16.0683, 108.2243, 'Han Market', 'Chợ Hàn', 'Главный туристический', 'Старейший рынок у западного берега Хан (576 лавок, 2 этажа): шёлк, лак, морепродукты, вьетнамские сувениры. Aozai на заказ за 1 час.', '05:00-19:00', null, '119 Trần Phú, Hải Châu', 'Han Market Da Nang', 'in', '1-1.5 ч', null);
add('market', 16.0680, 108.2122, 'Con Market', 'Chợ Cồn', 'Местный рынок', 'Огромный 3-этажный рынок с 2000+ прилавками — ткани, одежда, специи, морепродукты. Местный, не туристический. Цены дёшево, торг обязателен.', '06:00-20:00', null, '290 Hùng Vương, Vinh Trung, Hải Châu', 'Con Market Da Nang', 'in', '1.5-2 ч', null);
add('event', 16.0474, 108.2199, 'Helio Night Market', 'Chợ đêm Helio', 'Крупнейший ночной', 'Крупнейший ночной рынок — 4 зоны: уличная еда, морепродукты, пивной двор, сувениры. 300+ прилавков. Колесо обозрения не работает (Asia Park закрыт).', '17:00-22:30', null, '01-02 Đường 2/9, Hoà Cương Bắc, Hải Châu', 'Helio Night Market Da Nang', 'out', '2-3 ч', null);
add('event', 16.0616, 108.2320, 'Son Tra Night Market', 'Chợ đêm Sơn Trà', 'У Моста Дракона', 'Ночной рынок у подножия Моста Дракона (восточный берег). Реорганизован с авг.2025. Уличная еда, морепродукты, сувениры. Пт-Вс — шоу Дракона в 21:00.', '18:00-23:00', null, 'Mai Hắc Đế, An Hải Trung, Sơn Trà', 'Son Tra Night Market', 'out', '1.5-2 ч', null);
add('event', 16.0415, 108.2453, 'An Thuong Night Area', 'Phố đêm An Thượng', 'Экспат-улица', 'Не рынок, а улица ресторанов и баров у My Khe. Экспаты + туристы. Морепродукты, вьетнамская кухня, коктейли. Вайб расслабленный.', '18:00-00:00', null, 'An Thượng 29, Bắc Mỹ Phú, Ngũ Hành Sơn', 'An Thuong Night Market', 'out', '2-3 ч', null);
add('market', 16.1047, 108.2389, 'Tho Quang Fish Port', 'Cảng cá Thọ Quang', 'Рыбный порт', 'Крупнейший рыбный порт Центрального Вьетнама — сотни лодок разгружают улов на рассвете. Живые крабы, кальмары, рыба. Атмосфера аутентичная.', '04:00-08:00', null, 'Đường Vân Đồn, Thọ Quang, Sơn Trà', 'Tho Quang Fishing Port', 'out', '1 ч', null);
